version: "3.8"

services:
  vfs-agent:
    build: .
    container_name: vfs4agent
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./data:/app/data
      - ./examples/sample-docs:/app/docs-content:ro
    environment:
      - VFS_BACKEND=${VFS_BACKEND:-sqlite}
      - VFS_DB_PATH=/app/data/vfs.db
      - VFS_MOUNT=/vfs
      - CHROMA_URL=${CHROMA_URL:-http://chroma:8000}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-vfs_docs}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.6-plus}
    stdin_open: true
    tty: true
    working_dir: /app

  chroma:
    image: chromadb/chroma:latest
    profiles: ["chroma"]
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  chroma-data:
